services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    networks:
      - salon-hanif-network
      - web-gateway # Tambahkan ini

  # Nginx (Official Image)
  web-salon-hanif:
    image: nginx:alpine
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - salon-hanif-network
      - web-gateway # Tambahkan ini

  # Database MySQL 8.0
  db:
    container_name: db-salon-hanif
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=salon_hanif
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_USER=yazid
      - MYSQL_PASSWORD=secret
    volumes:
      - db-data-salon-hanif:/var/lib/mysql
    networks:
      - salon-hanif-network
  # Tambahkan phpMyAdmin di sini
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_salon_hanif
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "8092:80"
    networks:
      - salon-hanif-network

networks:
  salon-hanif-network:
    driver: bridge
  web-gateway: # Daftarkan network global di sini
    external: true

volumes:
  db-data-salon-hanif: